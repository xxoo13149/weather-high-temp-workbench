name = "weather-high-temp-workbench"
main = "src/cloudflare/worker.ts"
compatibility_date = "2026-04-08"
compatibility_flags = ["nodejs_compat"]
account_id = "c2606f405d74ecfd7506d0bcec3c9cee"

[assets]
directory = "./zip/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
HOST = "0.0.0.0"
PORT = "8787"
KELLY_SERVER_BASE_URL = "http://kelly-origin.lukaluka.fun:8081"
KELLY_STREAM_PROXY_MODE = "canary"
KELLY_PROXY_GET_TIMEOUT_MS = "14000"
DASHBOARD_PROXY_GET_TIMEOUT_MS = "8000"
KELLY_PROXY_STREAM_TIMEOUT_MS = "6000"

[[routes]]
pattern = "lukaluka.fun"
custom_domain = true

[[routes]]
pattern = "www.lukaluka.fun"
custom_domain = true
