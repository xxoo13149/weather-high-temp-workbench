name = "weather-high-temp-workbench"
main = "src/cloudflare/worker.ts"
compatibility_date = "2026-04-08"
compatibility_flags = ["nodejs_compat"]
account_id = "c2606f405d74ecfd7506d0bcec3c9cee"

[assets]
directory = "./zip/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
HOST = "0.0.0.0"
PORT = "8787"
# Production Kelly bridge stays behind the same user-facing domain via Worker proxy.
KELLY_BRIDGE_BASE_URL = "http://kelly-bridge.lukaluka.fun"
KELLY_BRIDGE_LOCAL_FALLBACK = "true"
# Store KELLY_BRIDGE_SHARED_SECRET with `wrangler secret put KELLY_BRIDGE_SHARED_SECRET`.

[[routes]]
pattern = "lukaluka.fun"
custom_domain = true
